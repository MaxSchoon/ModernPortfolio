name: Enhancement
description: Propose a feature, optimizer mode, report improvement, or developer experience change.
title: "[enhancement] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why does it help people experimenting with portfolio optimization?
      description: Who benefits, how it would be used, and what behavior would prove it works.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Suggested scope
      description: Note affected modes, ticker sets, reports, commands, or tests if you know them.
    validations:
      required: false
  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
